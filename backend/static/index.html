<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>股票量化智能猎人 - H5预览</title>
  <link rel="icon" type="image/svg+xml" href="/static/assets/qh-icon.svg">
  <style>
    :root {
      --red: #d71920;
      --red-2: #fff0f0;
      --green: #148044;
      --green-2: #eefaf2;
      --orange: #b45309;
      --orange-2: #fff7e6;
      --blue: #2563eb;
      --blue-2: #eef4ff;
      --bg: #f5f6f9;
      --card: #ffffff;
      --line: #e8edf4;
      --text: #171b24;
      --muted: #717b8c;
      --soft: #fafbfe;
      --shadow: 0 12px 34px rgba(15, 23, 42, .08);
    }

    * { box-sizing: border-box; }
    html, body { margin: 0; width: 100%; min-height: 100%; overflow-x: hidden; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", "Segoe UI", Arial, sans-serif;
    }
    button, input, select { font: inherit; }

    .shell {
      min-height: 100vh;
      display: grid;
      grid-template-columns: 244px minmax(0, 1fr);
      min-width: 0;
    }
    .sidebar {
      position: sticky;
      top: 0;
      height: 100vh;
      padding: 18px 14px;
      background: #fff;
      border-right: 1px solid var(--line);
      overflow-y: auto;
    }
    .brand {
      display: flex;
      gap: 12px;
      align-items: center;
      padding: 6px 8px 18px;
    }
    .brand-mark {
      width: 42px;
      height: 42px;
      border-radius: 0;
      display: grid;
      place-items: center;
      background: transparent;
      filter: drop-shadow(0 8px 14px rgba(215, 25, 32, .24));
    }
    .brand-mark img {
      width: 42px;
      height: 42px;
      display: block;
    }
    .brand-title { display: block; font-size: 17px; font-weight: 900; }
    .brand-sub { display: block; margin-top: 3px; color: var(--muted); font-size: 12px; }
    .nav { display: grid; gap: 5px; }
    .nav-group { display: grid; gap: 5px; }
    .nav-group + .nav-group { margin-top: 8px; }
    .nav-parent,
    .nav button,
    .nav-child {
      width: 100%;
      height: 44px;
      border: 0;
      border-radius: 10px;
      padding: 0 12px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: transparent;
      color: var(--muted);
      cursor: pointer;
      text-align: left;
    }
    .nav-parent {
      background: var(--soft);
      color: var(--text);
      font-weight: 900;
      border: 1px solid transparent;
    }
    .nav-parent.active {
      background: var(--red-2);
      border-color: #ffd5d7;
      color: var(--red);
    }
    .nav-children {
      display: none;
      gap: 4px;
      padding-left: 8px;
      border-left: 2px solid #f0f2f6;
      margin-left: 12px;
    }
    .nav-group.open .nav-children { display: grid; }
    .nav-child {
      height: 38px;
      border-radius: 9px;
      color: var(--muted);
      background: transparent;
    }
    .nav-child.active { background: var(--red-2); color: var(--red); }
    .nav strong { font-size: 14px; }
    .nav small { color: #a0a8b6; }
    .nav button.active { background: var(--red-2); color: var(--red); }
    .market-tabs { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 14px; }
    .tab-btn {
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 8px 13px;
      background: #fff;
      color: var(--muted);
      font-weight: 900;
      cursor: pointer;
    }
    .tab-btn.active { background: var(--red-2); border-color: #ffd5d7; color: var(--red); }

    .main { min-width: 0; max-width: 100%; padding: 20px; }
    .topbar {
      position: sticky;
      top: 0;
      z-index: 30;
      margin: -20px -20px 18px;
      padding: 12px 20px;
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 12px;
      background: rgba(245, 246, 249, .94);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid rgba(232, 237, 244, .9);
    }
    .search {
      position: relative;
      height: 44px;
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 0 13px;
      border: 1px solid var(--line);
      border-radius: 12px;
      background: #fff;
    }
    .search span { color: var(--muted); font-size: 13px; white-space: nowrap; }
    .search input { width: 100%; border: 0; outline: 0; color: var(--text); }
    .search-clear {
      width: 26px;
      height: 26px;
      border: 0;
      border-radius: 50%;
      display: none;
      place-items: center;
      background: #f1f3f7;
      color: var(--muted);
      cursor: pointer;
      font-weight: 900;
      line-height: 1;
    }
    .search-clear.show { display: grid; }
    .suggestions {
      position: absolute;
      left: 0;
      right: 0;
      top: calc(100% + 8px);
      z-index: 50;
      display: none;
      max-height: 330px;
      overflow-y: auto;
      padding: 8px;
      border: 1px solid var(--line);
      border-radius: 14px;
      background: #fff;
      box-shadow: var(--shadow);
    }
    .suggestions.open { display: block; }
    .suggestion {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 10px;
      align-items: center;
      padding: 10px 12px;
      border-radius: 10px;
      cursor: pointer;
    }
    .suggestion:hover { background: var(--red-2); }
    .suggestion b { display: inline-block; margin-right: 8px; }
    .suggestion code { color: var(--muted); font-family: Menlo, Consolas, monospace; }

    .actions { display: flex; gap: 9px; align-items: center; justify-content: flex-end; flex-wrap: wrap; }
    .btn {
      border: 1px solid var(--line);
      border-radius: 10px;
      min-height: 38px;
      padding: 8px 13px;
      background: #fff;
      color: var(--text);
      font-weight: 800;
      cursor: pointer;
      white-space: nowrap;
    }
    .btn.primary { background: var(--red); border-color: var(--red); color: #fff; }
    .btn.danger { background: var(--red-2); border-color: #ffd5d7; color: var(--red); }
    .btn.green { background: var(--green-2); border-color: #cfeeda; color: var(--green); }
    .btn.blue { background: var(--blue-2); border-color: #d8e4ff; color: var(--blue); }
    .status {
      min-height: 38px;
      padding: 8px 12px;
      display: inline-flex;
      gap: 8px;
      align-items: center;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: #fff;
      color: var(--muted);
      font-size: 13px;
    }
    .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--green); box-shadow: 0 0 0 4px rgba(20, 128, 68, .12); }
    .dot.halt { background: var(--red); box-shadow: 0 0 0 4px rgba(215, 25, 32, .12); }
    .trustee-light {
      width: 13px;
      height: 13px;
      border-radius: 50%;
      display: inline-block;
      flex: 0 0 auto;
      background: #a0a8b6;
      box-shadow: 0 0 0 5px rgba(160, 168, 182, .14);
    }
    .trustee-light.red {
      background: var(--red);
      box-shadow: 0 0 0 5px rgba(215, 25, 32, .14), 0 0 14px rgba(215, 25, 32, .45);
    }
    .trustee-light.green {
      background: var(--green);
      box-shadow: 0 0 0 5px rgba(20, 128, 68, .14), 0 0 14px rgba(20, 128, 68, .45);
    }
    .trustee-light.gray {
      background: #a0a8b6;
      box-shadow: 0 0 0 5px rgba(160, 168, 182, .14);
    }
    .trustee-status-pill {
      min-height: 38px;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 11px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: #fff;
      font-weight: 900;
      color: var(--muted);
      white-space: nowrap;
    }

    .section { display: none; min-width: 0; max-width: 100%; animation: fade .16s ease; }
    .section.active { display: block; }
    @keyframes fade { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: translateY(0); } }
    .head {
      margin: 3px 0 15px;
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
      gap: 16px;
    }
    .head h2 { margin: 0; font-size: 24px; }
    .head p { margin: 6px 0 0; color: var(--muted); font-size: 13px; line-height: 1.6; }
    .grid { display: grid; gap: 14px; min-width: 0; max-width: 100%; }
    .cols-2 { grid-template-columns: repeat(2, minmax(0, 1fr)); }
    .cols-3 { grid-template-columns: repeat(3, minmax(0, 1fr)); }
    .cols-4 { grid-template-columns: repeat(4, minmax(0, 1fr)); }
    .card {
      min-width: 0;
      max-width: 100%;
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 14px;
      box-shadow: 0 8px 24px rgba(15, 23, 42, .04);
    }
    .pad { padding: 16px; }
    .metric { padding: 16px; }
    .metric-label { color: var(--muted); font-size: 13px; }
    .metric-value { margin-top: 8px; font-size: 25px; font-weight: 900; font-family: Menlo, Consolas, monospace; line-height: 1.1; }
    .metric-foot { margin-top: 8px; color: #9da6b5; font-size: 12px; }
    .up { color: var(--red); }
    .down { color: var(--green); }
    .warn { color: var(--orange); }
    .muted { color: var(--muted); }
    .panel-title {
      min-height: 52px;
      padding: 14px 16px;
      border-bottom: 1px solid var(--line);
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      font-weight: 900;
    }
    .panel-body { padding: 16px; }
    .hero {
      padding: 22px;
      border-radius: 16px;
      background: linear-gradient(135deg, #d71920, #a70f16);
      color: #fff;
      box-shadow: var(--shadow);
    }
    .hero h1 { margin: 0; font-size: 26px; }
    .hero p { max-width: 780px; margin: 10px 0 0; color: rgba(255,255,255,.86); line-height: 1.75; }
    .chips { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 16px; }
    .chip { padding: 7px 10px; border-radius: 999px; background: rgba(255,255,255,.16); border: 1px solid rgba(255,255,255,.24); font-size: 12px; font-weight: 800; }

    table { width: 100%; min-width: 720px; border-collapse: collapse; background: #fff; }
    .table-wrap { max-width: 100%; overflow-x: auto; overflow-y: hidden; border-radius: 14px; -webkit-overflow-scrolling: touch; }
    th {
      padding: 12px 13px;
      background: var(--soft);
      color: var(--muted);
      border-bottom: 1px solid var(--line);
      font-size: 12px;
      text-align: left;
      white-space: nowrap;
    }
    td { padding: 12px 13px; border-bottom: 1px solid var(--line); font-size: 14px; vertical-align: middle; }
    tr:hover td { background: #fff8f8; }
    .num { text-align: right; font-family: Menlo, Consolas, monospace; font-weight: 800; }
    .stock-name { font-weight: 900; }
    .stock-code { margin-top: 3px; color: #98a1b0; font-family: Menlo, Consolas, monospace; font-size: 12px; }
    .badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 54px;
      padding: 4px 8px;
      border-radius: 8px;
      font-size: 12px;
      font-weight: 900;
    }
    .badge.red { background: var(--red-2); color: var(--red); }
    .badge.green { background: var(--green-2); color: var(--green); }
    .badge.orange { background: var(--orange-2); color: var(--orange); }
    .badge.blue { background: var(--blue-2); color: var(--blue); }
    .badge.gray { background: #f1f3f7; color: var(--muted); }

    .kv { display: grid; gap: 10px; }
    .kv-row {
      display: grid;
      grid-template-columns: 104px minmax(0, 1fr);
      gap: 10px;
      padding-bottom: 10px;
      border-bottom: 1px dashed var(--line);
      font-size: 13px;
      line-height: 1.55;
    }
    .kv-row:last-child { border-bottom: 0; padding-bottom: 0; }
    .kv-row span:first-child { color: var(--muted); }
    .score-grid { display: grid; grid-template-columns: repeat(4, minmax(0, 1fr)); gap: 10px; }
    .score-cell { padding: 12px; border-radius: 12px; border: 1px solid var(--line); background: var(--soft); }
    .score-label { color: var(--muted); font-size: 12px; }
    .score-value { margin-top: 5px; font-size: 22px; font-weight: 900; font-family: Menlo, Consolas, monospace; }
    .toolbar { display: flex; flex-wrap: wrap; align-items: center; gap: 10px; margin-bottom: 14px; }
    .field { min-width: 138px; display: grid; gap: 6px; }
    .field label { color: var(--muted); font-size: 12px; font-weight: 800; }
    .field input, .field select {
      height: 40px;
      padding: 0 10px;
      border: 1px solid var(--line);
      border-radius: 10px;
      outline: 0;
      background: #fff;
    }
    .field.wide { min-width: 260px; }
    .field.search-field { position: relative; }
    .inline-suggestions {
      position: absolute;
      left: 0;
      right: 0;
      top: calc(100% + 6px);
      z-index: 60;
      display: none;
      max-height: 260px;
      overflow-y: auto;
      padding: 8px;
      border: 1px solid var(--line);
      border-radius: 12px;
      background: #fff;
      box-shadow: var(--shadow);
    }
    .inline-suggestions.open { display: block; }
    .model-list { display: grid; gap: 8px; max-height: 360px; overflow: auto; }
    .model-row {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 10px;
      align-items: center;
      padding: 11px 12px;
      border: 1px solid var(--line);
      border-radius: 10px;
      background: #fff;
    }
    .model-row.active { border-color: var(--red); background: var(--red-2); }
    .model-row strong { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .model-row small { display: block; margin-top: 3px; color: var(--muted); }
    .policy-grid { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 10px; }
    .note { color: var(--muted); font-size: 12px; line-height: 1.6; }
    .loading { padding: 26px; color: var(--muted); text-align: center; }
    .placeholder-grid { display: grid; grid-template-columns: repeat(3, minmax(0, 1fr)); gap: 14px; }
    .placeholder { padding: 16px; border: 1px dashed #cbd3df; border-radius: 14px; background: #fff; }
    .placeholder h3 { margin: 0 0 8px; font-size: 15px; }
    .placeholder p { margin: 0; color: var(--muted); font-size: 13px; line-height: 1.7; }
    .agent-card { padding: 15px; border: 1px solid var(--line); border-radius: 14px; background: #fff; display: grid; gap: 12px; }
    .agent-head { display: flex; justify-content: space-between; align-items: flex-start; gap: 10px; }
    .agent-head h3 { margin: 0; font-size: 16px; }
    .agent-role { margin-top: 6px; color: var(--muted); font-size: 12px; line-height: 1.55; }
    .agent-metrics { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 8px; }
    .agent-metric { padding: 9px 10px; border: 1px solid var(--line); border-radius: 10px; background: var(--soft); }
    .agent-metric span { display: block; color: var(--muted); font-size: 11px; }
    .agent-metric b { display: block; margin-top: 4px; font-family: Menlo, Consolas, monospace; font-size: 13px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .agent-log { display: grid; gap: 7px; max-height: 180px; overflow: auto; }
    .agent-log-row { display: grid; grid-template-columns: 72px minmax(0, 1fr); gap: 8px; padding: 8px 0; border-bottom: 1px dashed var(--line); font-size: 12px; line-height: 1.5; }
    .agent-log-row:last-child { border-bottom: 0; }
    .agent-log-row span { color: var(--muted); font-family: Menlo, Consolas, monospace; }
    .sector-layout { display: grid; grid-template-columns: minmax(360px, .95fr) minmax(0, 1.05fr); gap: 14px; min-width: 0; max-width: 100%; align-items: start; }
    .sector-scroll { min-width: 0; max-width: 100%; max-height: calc(100vh - 260px); overflow-y: auto; overflow-x: hidden; overscroll-behavior: contain; }
    .sector-detail-scroll { min-width: 0; max-width: 100%; max-height: calc(100vh - 260px); overflow-y: auto; overflow-x: hidden; overscroll-behavior: contain; padding-right: 4px; }
    .sector-card { cursor: pointer; transition: border-color .16s ease, box-shadow .16s ease, transform .16s ease; }
    .sector-card:hover { border-color: #ffd0d2; box-shadow: 0 10px 28px rgba(15, 23, 42, .07); transform: translateY(-1px); }
    .sector-card.active { border-color: var(--red); box-shadow: 0 0 0 3px rgba(215, 25, 32, .08); }
    .sector-row { display: grid; grid-template-columns: minmax(0, 1fr) auto; gap: 10px; align-items: center; padding: 12px 14px; border-bottom: 1px solid var(--line); }
    .sector-row:last-child { border-bottom: 0; }
    .sector-name { font-weight: 900; }
    .sector-meta { margin-top: 5px; display: flex; flex-wrap: wrap; gap: 6px; color: var(--muted); font-size: 12px; }
    .sector-news-row { display: grid; gap: 6px; padding: 10px 0; border-bottom: 1px dashed var(--line); }
    .sector-news-row:last-child { border-bottom: 0; }
    .sector-news-row strong { line-height: 1.55; }
    .news-layout { display: grid; grid-template-columns: minmax(320px, .85fr) minmax(0, 1.15fr); gap: 14px; }
    .news-scroll { max-height: calc(100vh - 330px); overflow-y: auto; overscroll-behavior: contain; }
    .news-card { padding: 12px 14px; border-bottom: 1px solid var(--line); cursor: pointer; border-left: 3px solid transparent; }
    .news-card:hover { background: #fff8f8; }
    .news-card.positive { background: #fff8f8; border-left-color: var(--red); }
    .news-card.negative { background: #f2fbf5; border-left-color: var(--green); }
    .news-card.news-soft.positive { background: #fffafa; border-left-color: #ffb9be; }
    .news-card.news-mid.positive { background: #fff4f4; border-left-color: #ef6b72; }
    .news-card.news-strong.positive { background: #ffe8e8; border-left-color: var(--red); }
    .news-card.news-soft.negative { background: #f7fcf8; border-left-color: #a9ddb8; }
    .news-card.news-mid.negative { background: #eff9f2; border-left-color: #55b978; }
    .news-card.news-strong.negative { background: #e3f5e9; border-left-color: var(--green); }
    .news-card.readonly { cursor: default; opacity: .92; }
    .news-card.readonly:hover { background: inherit; }
    .timeline { position: relative; display: grid; gap: 0; padding-left: 112px; }
    .timeline:before { content: ""; position: absolute; left: 94px; top: 6px; bottom: 6px; width: 2px; background: #e4e8ef; }
    .timeline-date { position: relative; margin: 8px 0 12px; font-size: 20px; font-weight: 900; color: var(--text); }
    .timeline-date:before { content: ""; position: absolute; left: -23px; top: 11px; width: 10px; height: 10px; border-radius: 50%; background: #2f7fe8; border: 2px solid #fff; box-shadow: 0 0 0 1px #2f7fe8; }
    .timeline-item { position: relative; margin-bottom: 10px; border: 1px solid var(--line); padding: 10px 12px; border-radius: 10px; background: var(--soft); }
    .timeline-item:before { content: ""; position: absolute; left: -25px; top: 16px; width: 9px; height: 9px; border-radius: 50%; background: #b8c0cc; border: 2px solid #fff; box-shadow: 0 0 0 1px #d9dee8; }
    .timeline-item.good { border-color: #ffd6d9; background: #fff5f5; }
    .timeline-item.good:before { background: #ffb9be; box-shadow: 0 0 0 1px #ffb9be; }
    .timeline-item.bad { border-color: #cfeeda; background: #f2fbf5; }
    .timeline-item.bad:before { background: #9edeb4; box-shadow: 0 0 0 1px #9edeb4; }
    .timeline-item.major-good { border-color: var(--red); background: var(--red-2); }
    .timeline-item.major-good:before { background: var(--red); box-shadow: 0 0 0 2px rgba(215,25,32,.16); }
    .timeline-item.major-bad { border-color: var(--green); background: var(--green-2); }
    .timeline-item.major-bad:before { background: var(--green); box-shadow: 0 0 0 2px rgba(20,128,68,.16); }
    .timeline-item.super-good { border-color: #b31218; background: #ffe2e4; box-shadow: inset 3px 0 0 #b31218; }
    .timeline-item.super-good:before { background: #b31218; box-shadow: 0 0 0 3px rgba(179,18,24,.18); }
    .timeline-item.super-bad { border-color: #0d6b39; background: #e4f8eb; box-shadow: inset 3px 0 0 #0d6b39; }
    .timeline-item.super-bad:before { background: #0d6b39; box-shadow: 0 0 0 3px rgba(13,107,57,.18); }
    .timeline-time { position: absolute; left: -112px; top: 11px; width: 82px; color: var(--muted); font-size: 12px; text-align: right; }
    .timeline-main { padding-right: 86px; }
    .timeline-mark { position: absolute; right: 10px; top: 10px; }
    .mark-select {
      height: 28px;
      max-width: 76px;
      border-radius: 8px;
      border: 1px solid var(--line);
      background: rgba(255,255,255,.92);
      color: var(--muted);
      font-size: 12px;
      font-weight: 800;
      padding: 0 6px;
      outline: none;
    }
    .mark-select:hover { border-color: var(--red); color: var(--red); }
    .flow-strip { display: grid; grid-template-columns: repeat(auto-fit, minmax(118px, 1fr)); gap: 8px; min-width: 0; max-width: 100%; }
    .flow-pill { min-width: 0; padding: 9px 10px; border: 1px solid var(--line); border-radius: 10px; background: var(--soft); }
    .flow-pill span { display: block; color: var(--muted); font-size: 11px; }
    .flow-pill b { display: block; margin-top: 4px; font-family: Menlo, Consolas, monospace; overflow-wrap: anywhere; }
    .pipeline { display: grid; grid-template-columns: repeat(6, minmax(0, 1fr)); gap: 10px; }
    .pipeline-step { padding: 12px; border: 1px solid var(--line); border-radius: 12px; background: var(--soft); text-align: center; font-size: 13px; font-weight: 900; }
    .strategy-grid { display: grid; grid-template-columns: repeat(3, minmax(0, 1fr)); gap: 14px; }
    .strategy-card {
      padding: 16px;
      border: 1px solid var(--line);
      border-radius: 14px;
      background: #fff;
      cursor: pointer;
      transition: border-color .16s ease, box-shadow .16s ease, transform .16s ease;
    }
    .strategy-card:hover { transform: translateY(-1px); box-shadow: 0 10px 28px rgba(15, 23, 42, .07); }
    .strategy-card.active { border-color: var(--red); box-shadow: 0 0 0 3px rgba(215, 25, 32, .08); }
    .strategy-card h3 { margin: 0; font-size: 18px; }
    .strategy-meta { display: flex; flex-wrap: wrap; gap: 8px; margin: 12px 0; }
    .strategy-card p { margin: 0; color: var(--muted); font-size: 13px; line-height: 1.7; }
    .strategy-list { margin: 12px 0 0; padding-left: 18px; color: var(--text); font-size: 13px; line-height: 1.8; }

    .chart-box { padding: 12px; border-radius: 14px; background: #fff; border: 1px solid var(--line); }
    .chart-title { display: flex; justify-content: space-between; gap: 10px; margin-bottom: 10px; font-weight: 900; }
    .chart-title span { color: var(--muted); font-size: 12px; font-weight: 500; }
    canvas.chart { width: 100%; height: 250px; display: block; border-radius: 10px; background: #fff; border: 1px solid #f0f2f6; }
    canvas.chart.small { height: 160px; }

    .modal {
      position: fixed;
      inset: 0;
      z-index: 90;
      display: none;
      padding: 18px;
      overflow-y: auto;
      background: rgba(23, 27, 36, .28);
    }
    .modal.open { display: block; }
    .modal-card { max-width: 1120px; margin: 18px auto; background: #fff; border-radius: 18px; box-shadow: var(--shadow); overflow: hidden; }
    .modal-head {
      position: sticky;
      top: 0;
      z-index: 2;
      min-height: 58px;
      display: grid;
      grid-template-columns: auto minmax(0, 1fr) auto;
      align-items: center;
      gap: 10px;
      padding: 12px 14px;
      background: #fff;
      border-bottom: 1px solid var(--line);
    }
    .modal-head h2 { margin: 0; font-size: 19px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .back-btn, .close-btn {
      border: 1px solid var(--line);
      background: #fff;
      border-radius: 10px;
      height: 36px;
      min-width: 36px;
      padding: 0 11px;
      cursor: pointer;
      font-weight: 900;
    }
    .modal-body { padding: 16px; }
    .action-strip {
      display: flex;
      flex-wrap: wrap;
      align-items: end;
      gap: 10px;
      padding: 12px;
      border-radius: 14px;
      background: var(--soft);
      border: 1px solid var(--line);
    }
    .quote {
      display: grid;
      grid-template-columns: 220px minmax(0, 1fr);
      gap: 14px;
      align-items: stretch;
      margin-bottom: 14px;
    }
    .quote-main { padding: 18px; border: 1px solid var(--line); border-radius: 14px; background: #fff; }
    .quote-price { font-size: 44px; font-weight: 900; font-family: Menlo, Consolas, monospace; line-height: 1; }
    .quote-change { display: flex; gap: 12px; margin-top: 8px; font-weight: 900; }
    .quote-grid { display: grid; grid-template-columns: repeat(3, minmax(0, 1fr)); gap: 8px; }
    .quote-cell { padding: 10px 12px; border: 1px solid var(--line); border-radius: 12px; background: var(--soft); }
    .quote-cell span { display: block; color: var(--muted); font-size: 12px; }
    .quote-cell b { display: block; margin-top: 4px; font-family: Menlo, Consolas, monospace; }
    .report { display: grid; gap: 14px; line-height: 1.7; }
    .report h3 { margin: 0; }
    .report-block { padding: 15px; border: 1px solid var(--line); border-radius: 14px; background: #fff; }
    .report-block ul { margin: 8px 0 0; padding-left: 18px; }
    .orderbook-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .orderbook-side { display: grid; gap: 6px; }
    .orderbook-row {
      display: grid;
      grid-template-columns: 38px 1fr 72px;
      align-items: center;
      gap: 8px;
      padding: 6px 8px;
      border-radius: 8px;
      background: var(--soft);
      font-size: 12px;
      font-family: Menlo, Consolas, monospace;
    }
    .orderbook-row .bar { height: 6px; border-radius: 999px; background: #eef1f6; overflow: hidden; }
    .orderbook-row .bar i { display: block; height: 100%; border-radius: inherit; }
    .orderbook-row.ask .bar i { background: rgba(20, 128, 68, .58); }
    .orderbook-row.bid .bar i { background: rgba(215, 25, 32, .62); }
    .flow-split { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 10px; }
    .flow-box { padding: 10px; border-radius: 10px; background: var(--soft); border: 1px solid var(--line); }
    .flow-box b { display: block; margin-top: 4px; font-size: 18px; font-family: Menlo, Consolas, monospace; }
    .toast {
      position: fixed;
      left: 50%;
      top: 50%;
      z-index: 120;
      display: none;
      max-width: 380px;
      padding: 12px 14px;
      border: 1px solid var(--line);
      border-radius: 12px;
      background: #fff;
      color: var(--text);
      box-shadow: var(--shadow);
      font-weight: 800;
      transform: translate(12px, 12px);
      pointer-events: none;
    }
    .job-progress { display: grid; gap: 12px; }
    .progress-head { display: flex; justify-content: space-between; gap: 12px; align-items: baseline; }
    .progress-title { font-weight: 900; }
    .progress-text { color: var(--muted); font-size: 12px; }
    .progress-track { height: 10px; border-radius: 999px; background: #eef1f6; overflow: hidden; }
    .progress-fill { height: 100%; border-radius: inherit; background: linear-gradient(90deg, #d71920, #ef7d7d); transition: width .25s ease; }
    .progress-fill.green { background: linear-gradient(90deg, #148044, #5fca8b); }
    .progress-fill.blue { background: linear-gradient(90deg, #2563eb, #8bb4ff); }
    .toast-progress {
      width: 100%;
      height: 4px;
      margin-top: 10px;
      overflow: hidden;
      border-radius: 999px;
      background: #f1f3f7;
    }
    .toast-progress i {
      display: block;
      width: 42%;
      height: 100%;
      border-radius: inherit;
      background: linear-gradient(90deg, #d71920, #ff8a8a);
      animation: toastProgress 1.05s ease-in-out infinite;
    }
    @keyframes toastProgress {
      0% { transform: translateX(-110%); }
      55% { transform: translateX(80%); }
      100% { transform: translateX(240%); }
    }
    .result-modal {
      position: fixed;
      inset: 0;
      z-index: 180;
      display: none;
      place-items: center;
      padding: 18px;
      background: rgba(23, 27, 36, .28);
    }
    .result-modal.open { display: grid; }
    .result-card {
      width: min(620px, calc(100vw - 36px));
      background: #fff;
      border: 1px solid var(--line);
      border-radius: 18px;
      box-shadow: var(--shadow);
      overflow: hidden;
    }
    .result-head {
      padding: 18px 22px 12px;
      border-bottom: 1px solid var(--line);
      font-size: 20px;
      font-weight: 900;
    }
    .result-body { padding: 18px 22px; line-height: 1.85; color: var(--text); }
    .result-foot {
      padding: 14px 22px 18px;
      display: flex;
      justify-content: flex-end;
      border-top: 1px solid var(--line);
      background: #fffafa;
    }
    .calendar-modal {
      position: fixed;
      inset: 0;
      z-index: 175;
      display: none;
      place-items: center;
      padding: 18px;
      background: rgba(23, 27, 36, .24);
      backdrop-filter: blur(5px);
    }
    .calendar-modal.open { display: grid; }
    .calendar-card {
      width: min(520px, calc(100vw - 28px));
      background: linear-gradient(145deg, #fff, #f3fbf8);
      border: 1px solid var(--line);
      border-radius: 16px;
      box-shadow: var(--shadow);
      overflow: hidden;
    }
    .calendar-head {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 10px;
      align-items: center;
      padding: 18px 20px;
      border-bottom: 1px solid rgba(232, 237, 244, .9);
    }
    .calendar-title { font-size: 20px; font-weight: 900; }
    .calendar-nav { display: flex; gap: 8px; }
    .calendar-nav button {
      width: 34px;
      height: 34px;
      border: 1px solid var(--line);
      border-radius: 10px;
      background: rgba(255,255,255,.74);
      cursor: pointer;
      font-weight: 900;
    }
    .calendar-week,
    .calendar-grid {
      display: grid;
      grid-template-columns: repeat(7, minmax(0, 1fr));
      gap: 4px;
      padding: 0 16px;
    }
    .calendar-week { padding-top: 14px; color: var(--muted); font-weight: 900; text-align: center; }
    .calendar-grid { padding-bottom: 16px; }
    .calendar-day {
      min-height: 56px;
      border: 0;
      border-radius: 50%;
      background: transparent;
      cursor: pointer;
      color: var(--text);
      display: grid;
      place-items: center;
      line-height: 1.05;
    }
    .calendar-day b { display: block; font-size: 18px; }
    .calendar-day small { display: block; margin-top: 3px; font-size: 11px; color: var(--muted); }
    .calendar-day:hover { background: rgba(215, 25, 32, .08); }
    .calendar-day.closed { cursor: not-allowed; color: #a0a8b6; opacity: .48; }
    .calendar-day.closed:hover { background: transparent; }
    .calendar-day.selected { background: #4b6270; color: #fff; }
    .calendar-day.selected small { color: rgba(255,255,255,.78); }
    .calendar-day.out-month { opacity: .34; }
    .calendar-foot {
      padding: 12px 18px 16px;
      border-top: 1px solid rgba(232, 237, 244, .9);
      color: var(--muted);
      font-size: 13px;
      line-height: 1.6;
    }
    .ai-chat-launch {
      position: fixed; right: 18px; bottom: 78px; z-index: 95;
      width: 46px; height: 46px; border-radius: 50%; border: 1px solid rgba(215,25,32,.25);
      background: linear-gradient(135deg, #d71920, #ff6b6b); color: #fff; font-weight: 900;
      box-shadow: 0 14px 30px rgba(215,25,32,.22); cursor: pointer;
    }
    .ai-chat { position: fixed; right: 18px; bottom: 132px; z-index: 140; width: min(460px, calc(100vw - 28px)); min-width: 320px; min-height: 300px; display: none; resize: both; overflow: auto; }
    .ai-chat.open { display: block; }
    .ai-chat-card { height: 100%; display: flex; flex-direction: column; background: #fff; border: 1px solid var(--line); border-radius: 14px; box-shadow: var(--shadow); overflow: hidden; }
    .ai-chat-head { display: flex; align-items: center; justify-content: space-between; gap: 10px; padding: 12px 14px; border-bottom: 1px solid var(--line); background: #fff7f7; }
    .ai-chat-head { cursor: move; user-select: none; }
    .ai-chat-head strong { color: var(--red); }
    .ai-chat-body { flex: 1; min-height: 160px; overflow: auto; padding: 12px; background: #fbfcfe; }
    .ai-msg { margin-bottom: 10px; display: flex; }
    .ai-msg.user { justify-content: flex-end; }
    .ai-bubble { max-width: 86%; padding: 10px 12px; border-radius: 12px; border: 1px solid var(--line); background: #fff; line-height: 1.65; white-space: pre-wrap; }
    .ai-msg.user .ai-bubble { background: #fff1f1; border-color: rgba(215,25,32,.18); }
    .ai-chat-input { display: flex; gap: 8px; padding: 10px; border-top: 1px solid var(--line); background: #fff; }
    .ai-chat-input textarea { flex: 1; min-height: 42px; max-height: 96px; resize: vertical; border: 1px solid var(--line); border-radius: 10px; padding: 9px; font: inherit; }

    /* Premium red trading theme */
    :root {
      --red: #d71920;
      --red-deep: #8f0f16;
      --red-soft: #fff1f2;
      --red-2: #fff3f4;
      --gold: #c88a21;
      --ink: #111827;
      --bg: #f7f2f2;
      --card: rgba(255, 255, 255, .88);
      --line: rgba(126, 31, 39, .12);
      --text: #171217;
      --muted: #766b73;
      --soft: rgba(255, 248, 248, .76);
      --shadow: 0 18px 48px rgba(98, 12, 19, .10), 0 2px 8px rgba(17, 24, 39, .04);
      --cursor-x: 50vw;
      --cursor-y: 18vh;
    }
    html { background: #f7f2f2; }
    body {
      min-height: 100vh;
      background:
        radial-gradient(circle at var(--cursor-x) var(--cursor-y), rgba(215, 25, 32, .14), transparent 25rem),
        radial-gradient(circle at 8% 4%, rgba(255, 214, 219, .78), transparent 24rem),
        linear-gradient(135deg, #fffafa 0%, #f7f2f2 42%, #f9fbff 100%);
      overflow-x: hidden;
    }
    body:before {
      content: "";
      position: fixed;
      inset: 0;
      z-index: -3;
      pointer-events: none;
      background-image:
        linear-gradient(rgba(126, 31, 39, .045) 1px, transparent 1px),
        linear-gradient(90deg, rgba(126, 31, 39, .045) 1px, transparent 1px);
      background-size: 42px 42px;
      mask-image: linear-gradient(to bottom, rgba(0,0,0,.58), rgba(0,0,0,.12));
    }
    .ambient-glow,
    .cursor-aura {
      position: fixed;
      pointer-events: none;
      z-index: -2;
    }
    .ambient-glow {
      inset: auto -12vw -22vh auto;
      width: 48vw;
      height: 48vw;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(215, 25, 32, .16), rgba(255, 196, 0, .07) 36%, transparent 68%);
      filter: blur(8px);
    }
    .cursor-aura {
      left: var(--cursor-x);
      top: var(--cursor-y);
      width: 260px;
      height: 260px;
      border-radius: 50%;
      transform: translate(-50%, -50%);
      background: radial-gradient(circle, rgba(215, 25, 32, .16), rgba(215, 25, 32, .07) 36%, transparent 68%);
      mix-blend-mode: multiply;
      transition: opacity .2s ease;
    }
    .shell {
      grid-template-columns: 272px minmax(0, 1fr);
      isolation: isolate;
    }
    .sidebar {
      padding: 18px 14px;
      background:
        linear-gradient(180deg, rgba(255,255,255,.92), rgba(255,247,247,.84)),
        radial-gradient(circle at 20% 0%, rgba(215,25,32,.12), transparent 17rem);
      border-right: 1px solid rgba(126, 31, 39, .11);
      box-shadow: 12px 0 40px rgba(98, 12, 19, .06);
      backdrop-filter: blur(18px);
      overflow-y: auto;
      overscroll-behavior: contain;
      scrollbar-gutter: stable;
    }
    .sidebar::-webkit-scrollbar,
    .sector-scroll::-webkit-scrollbar,
    .sector-detail-scroll::-webkit-scrollbar {
      width: 8px;
      height: 8px;
    }
    .sidebar::-webkit-scrollbar-thumb,
    .sector-scroll::-webkit-scrollbar-thumb,
    .sector-detail-scroll::-webkit-scrollbar-thumb {
      border-radius: 999px;
      background: rgba(215, 25, 32, .24);
    }
    .sidebar::-webkit-scrollbar-track,
    .sector-scroll::-webkit-scrollbar-track,
    .sector-detail-scroll::-webkit-scrollbar-track {
      background: rgba(255, 241, 242, .44);
    }
    .brand {
      margin-bottom: 10px;
      padding: 10px 9px 18px;
      border-bottom: 1px solid rgba(126, 31, 39, .10);
    }
    .brand-mark {
      width: 48px;
      height: 48px;
      border-radius: 14px;
      background: linear-gradient(135deg, #fff, #fff1f2);
      box-shadow: 0 16px 32px rgba(215, 25, 32, .18);
    }
    .brand-mark img { width: 38px; height: 38px; }
    .brand-title { font-size: 18px; letter-spacing: 0; }
    .brand-sub { color: #9b6970; }
    .nav { gap: 7px; }
    .nav-parent,
    .nav button,
    .nav-child {
      position: relative;
      overflow: hidden;
      border-radius: 12px;
      transition: transform .18s ease, background .18s ease, color .18s ease, box-shadow .18s ease, border-color .18s ease;
    }
    .nav-parent {
      height: 46px;
      background: rgba(255,255,255,.58);
      border: 1px solid rgba(126, 31, 39, .08);
    }
    .nav-parent:hover,
    .nav-child:hover,
    .nav button:hover {
      transform: translateX(2px);
      background: rgba(255, 241, 242, .78);
      color: var(--red);
    }
    .nav-parent.active,
    .nav-child.active,
    .nav button.active {
      background: linear-gradient(135deg, #d71920, #a91018);
      border-color: rgba(215, 25, 32, .34);
      color: #fff;
      box-shadow: 0 14px 28px rgba(215, 25, 32, .20);
    }
    .nav-parent.active small,
    .nav-child.active small,
    .nav button.active small { color: rgba(255,255,255,.72); }
    .nav-children { border-left-color: rgba(215, 25, 32, .16); }
    .main {
      max-width: 1760px;
      width: 100%;
      margin: 0 auto;
      padding: 24px clamp(16px, 2vw, 30px) 34px;
    }
    .topbar {
      margin: -24px calc(clamp(16px, 2vw, 30px) * -1) 20px;
      padding: 14px clamp(16px, 2vw, 30px);
      background: rgba(255, 250, 250, .76);
      border-bottom: 1px solid rgba(126, 31, 39, .11);
      box-shadow: 0 14px 34px rgba(98, 12, 19, .06);
    }
    .search,
    .field input,
    .field select,
    .mark-select,
    .ai-chat-input textarea {
      background: rgba(255,255,255,.86);
      border-color: rgba(126, 31, 39, .13);
      box-shadow: inset 0 1px 0 rgba(255,255,255,.9);
      transition: border-color .18s ease, box-shadow .18s ease, background .18s ease;
    }
    .search:focus-within,
    .field input:focus,
    .field select:focus,
    .ai-chat-input textarea:focus {
      border-color: rgba(215, 25, 32, .46);
      box-shadow: 0 0 0 4px rgba(215,25,32,.08), inset 0 1px 0 rgba(255,255,255,.95);
      background: #fff;
    }
    .btn {
      border-color: rgba(126, 31, 39, .14);
      border-radius: 12px;
      background: rgba(255,255,255,.84);
      box-shadow: 0 8px 18px rgba(98, 12, 19, .05);
      transition: transform .18s ease, box-shadow .18s ease, border-color .18s ease, background .18s ease;
    }
    .btn:hover {
      transform: translateY(-1px);
      border-color: rgba(215,25,32,.26);
      box-shadow: 0 14px 26px rgba(98, 12, 19, .10);
    }
    .btn.primary {
      background: linear-gradient(135deg, #e11d2a, #a70f16);
      border-color: rgba(215,25,32,.78);
      box-shadow: 0 14px 28px rgba(215, 25, 32, .22);
    }
    .btn.danger { background: linear-gradient(135deg, #fff5f5, #ffe7e8); }
    .btn.blue { background: linear-gradient(135deg, #eef4ff, #fff); }
    .status,
    .tab-btn,
    .badge,
    .chip { box-shadow: 0 8px 18px rgba(98, 12, 19, .05); }
    .head {
      margin-bottom: 18px;
      padding: 0 2px;
    }
    .head h2 {
      font-size: clamp(22px, 2vw, 30px);
      line-height: 1.2;
    }
    .grid { gap: 16px; }
    .card,
    .agent-card,
    .strategy-card,
    .quote-main,
    .quote-cell,
    .report-block,
    .chart-box,
    .model-row,
    .placeholder,
    .score-cell,
    .flow-pill,
    .pipeline-step,
    .flow-box,
    .timeline-item {
      position: relative;
      border-color: rgba(126, 31, 39, .12);
      background: linear-gradient(180deg, rgba(255,255,255,.92), rgba(255,255,255,.76));
      box-shadow: var(--shadow);
      backdrop-filter: blur(14px);
    }
    .card.interactive-card,
    .agent-card,
    .strategy-card,
    .sector-card,
    .placeholder,
    .chart-box {
      transform-style: preserve-3d;
      transition: transform .2s ease, box-shadow .2s ease, border-color .2s ease;
    }
    .card.interactive-card:hover,
    .agent-card:hover,
    .strategy-card:hover,
    .sector-card:hover,
    .placeholder:hover,
    .chart-box:hover {
      border-color: rgba(215, 25, 32, .28);
      box-shadow: 0 22px 54px rgba(98, 12, 19, .14), 0 2px 8px rgba(17, 24, 39, .04);
    }
    .card.interactive-card:before,
    .agent-card:before,
    .strategy-card:before,
    .sector-card:before,
    .chart-box:before {
      content: "";
      position: absolute;
      inset: 0;
      border-radius: inherit;
      pointer-events: none;
      background: radial-gradient(circle at var(--card-x, 50%) var(--card-y, 0%), rgba(255,255,255,.82), transparent 34%);
      opacity: 0;
      transition: opacity .18s ease;
    }
    .card.interactive-card:hover:before,
    .agent-card:hover:before,
    .strategy-card:hover:before,
    .sector-card:hover:before,
    .chart-box:hover:before { opacity: 1; }
    .metric {
      overflow: hidden;
      min-height: 126px;
    }
    .metric:after {
      content: "";
      position: absolute;
      right: -28px;
      top: -36px;
      width: 112px;
      height: 112px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(215,25,32,.12), transparent 66%);
    }
    .metric-label { font-weight: 800; color: #8a6d73; }
    .metric-value { font-size: clamp(24px, 2.2vw, 34px); letter-spacing: 0; }
    .metric-foot { color: #a28c92; }
    .panel-title {
      background: linear-gradient(180deg, rgba(255,247,247,.92), rgba(255,255,255,.72));
      border-bottom-color: rgba(126, 31, 39, .10);
    }
    .hero {
      position: relative;
      min-height: 210px;
      display: grid;
      align-content: center;
      overflow: hidden;
      border: 1px solid rgba(255, 255, 255, .32);
      background:
        radial-gradient(circle at var(--card-x, 18%) var(--card-y, 20%), rgba(255,255,255,.30), transparent 16rem),
        linear-gradient(135deg, #d71920 0%, #9f1218 52%, #5b0c12 100%);

      const n = Number(v);

    function price(v) {
      const n = num(v);
      return Number.isFinite(n) && n !== 0 ? n.toFixed(2) : '--';
    }
    function pct(v) {
      if (v === null || v === undefined || v === '') return '--';
      const n = num(v);
      return Number.isFinite(n) && n !== 0 ? `${n > 0 ? '+' : ''}${n.toFixed(2)}%` : '--';

      const n = num(v);
      if (!Number.isFinite(n) || n === 0) return '--';

      return n.toFixed(0);

    async function api(url, options = {}) {
      const timeout = options.timeout || 12000;
      const controller = new AbortController();
      const timer = setTimeout(() => controller.abort(), timeout);
      const { timeout: _timeout, noCache, ...fetchOptions } = options;
      const requestUrl = noCache
        ? `${url}${url.includes('?') ? '&' : '?'}_=${Date.now()}`
        : url;
      try {
        const res = await fetch(API_BASE + requestUrl, {
          headers: { 'Content-Type': 'application/json', ...(noCache ? { 'Cache-Control': 'no-cache' } : {}) },
          cache: noCache ? 'no-store' : 'default',
          signal: controller.signal,
          ...fetchOptions
        });
        if (!res.ok) throw new Error(`${res.status} ${url}`);
        return await res.json();
      } catch (err) {
        if (err && (err.name === 'AbortError' || /aborted|abort|signal/i.test(err.message || ''))) {
          throw new Error(`请求超时或被浏览器中断，请稍后重试；如果是全市场AI选股，建议先用关注股票选股验证模型连通性。`);
        }
        if (err && /Failed to fetch/i.test(err.message || '')) {
          throw new Error('后端连接失败，请确认H5预览服务仍在运行，或刷新页面后重试。');
        }
        throw err;
      } finally {
        clearTimeout(timer);
      }
    }

    function clampAIChatLayout(layout) {
      const panel = document.getElementById('aiChat');
      const width = Math.min(Math.max(num(layout.width, panel?.offsetWidth || 420), 320), Math.max(320, window.innerWidth - 16));
      const height = Math.min(Math.max(num(layout.height, panel?.offsetHeight || 460), 300), Math.max(300, window.innerHeight - 16));
      const left = Math.min(window.innerWidth - width - 8, Math.max(8, num(layout.left, window.innerWidth - width - 18)));

    function applyAIChatLayout() {
      const panel = document.getElementById('aiChat');

      const layout = clampAIChatLayout(state.aiChatLayout);
      Object.assign(panel.style, {

    function initAIChatDrag() {
      const panel = document.getElementById('aiChat');
      const head = panel?.querySelector('.ai-chat-head');
      if (!panel || !head || panel.dataset.dragReady) return;
      panel.dataset.dragReady = '1';
      head.addEventListener('pointerdown', event => {
        if (event.target.closest('button, textarea, input, select, a')) return;
        const rect = panel.getBoundingClientRect();
        state.aiChatDragging = { dx: event.clientX - rect.left, dy: event.clientY - rect.top, width: rect.width, height: rect.height };
        panel.setPointerCapture?.(event.pointerId);
        panel.style.right = 'auto';
        panel.style.bottom = 'auto';
        panel.style.width = `${rect.width}px`;
        panel.style.height = `${rect.height}px`;
        event.preventDefault();
      });
      panel.addEventListener('pointermove', event => {
        const drag = state.aiChatDragging;
        if (!drag) return;
        const layout = clampAIChatLayout({ left: event.clientX - drag.dx, top: event.clientY - drag.dy, width: drag.width, height: drag.height });
        panel.style.left = `${layout.left}px`;
        panel.style.top = `${layout.top}px`;
        panel.style.width = `${layout.width}px`;
        panel.style.height = `${layout.height}px`;
        state.aiChatLayout = layout;
      });
      panel.addEventListener('pointerup', event => {
        if (!state.aiChatDragging) return;
        state.aiChatDragging = null;
        panel.releasePointerCapture?.(event.pointerId);
        saveAIChatLayout();
      });
      panel.addEventListener('pointercancel', event => {
        state.aiChatDragging = null;
        panel.releasePointerCapture?.(event.pointerId);
      });
      if ('ResizeObserver' in window) {
        const observer = new ResizeObserver(() => {
          if (!panel.classList.contains('open') || state.aiChatDragging) return;
          clearTimeout(initAIChatDrag.resizeTimer);
          initAIChatDrag.resizeTimer = setTimeout(saveAIChatLayout, 120);
        });
        observer.observe(panel);
      }
      window.addEventListener('resize', () => {
        if (!state.aiChatLayout) return;
        state.aiChatLayout = clampAIChatLayout(state.aiChatLayout);
        applyAIChatLayout();
      });
    }

    async function waitAIStockPickingJob(jobId, progress, scope) {
      const maxLoops = scope === 'all' ? 900 : 120;
      let pollErrors = 0;
      for (let i = 0; i < maxLoops; i += 1) {
        await wait(i < 5 ? 1200 : 2500);
        let job = await api(`/api/v1/quant/signals/ai-pick/status/${encodeURIComponent(jobId)}`, { timeout: scope === 'all' ? 12000 : 8000, noCache: true }).catch(e => ({ status: 'poll_error', message: e.message }));
        if (job.status === 'poll_error') {
          pollErrors += 1;
          job = await api('/api/v1/quant/signals/ai-pick/latest', { timeout: 12000, noCache: true }).catch(() => ({ status: 'poll_error' }));
          if (job.status === 'poll_error') {
            progress.update(`AI选股后台仍在运行，状态同步第${pollErrors}次重试...`);
            continue;
          }
        }
        pollErrors = 0;
        if (job.status === 'done' || job.status === 'failed') return job.result || { error: job.message || 'AI选股任务没有返回结果' };
        if (job.status === 'not_found') return { error: 'AI选股任务状态丢失，请刷新页面后重试。' };
        const p = job.progress || {};
        const batchText = p.total_count ? `（${p.completed_count || 0}/${p.total_count}）` : (p.batch_total ? `（${p.batch_done || 0}/${p.batch_total}）` : '');
        const countText = p.eligible_count ? `，候选${p.eligible_count}只` : (p.ai_scored_count ? `，AI已评分${p.ai_scored_count}只` : '');
        progress.update(`${job.message || 'AI选股后台运行中'}${batchText}${countText}`);
      }
      return {
        background_running: true,
        job_id: jobId,
        message: 'AI选股后台任务仍在运行。页面会停止本次等待，但不会把它记为失败；稍后可点“刷新信号”查看最终结果。'
      };
    }

    async function pollScreeningJob(jobId) {

          const result = job.result || {};
          state.screening = result.results || [];
          state.screeningLogic = result.logic || null;
          state.screeningJob = job;
          await refreshAgents(false);
          if (state.active === 'screening') renderScreening();
          toast(`选股完成：${result.count || state.screening.length}只`);
          return;
        }
        if (job.status === 'failed' || job.status === 'missing') {
          state.screeningJob = null;
          if (state.active === 'screening') renderScreening();
          toast(job.status === 'missing' ? '选股任务已失效，请重新运行选股' : (job.message || '选股任务失败'));
          return;
        }
        await new Promise(resolve => setTimeout(resolve, 2000));

    async function searchStock() {
      const raw = document.getElementById('searchInput').value.trim();
      const kw = normalizeStockKeyword(raw);
      if (!kw) return switchSection('market');
      const res = await api(`/api/v1/stocks/search?keyword=${encodeURIComponent(kw)}&limit=30`, { timeout: 10000 }).catch(() => []);
      closeSuggestions();
      if (!res.length) return toast('没有找到匹配股票');
      if (res.length === 1) return openStock(res[0].code);
      state.marketSearchRows = sortStockMatches(res, kw);
      switchSection('market');
    }
    function handleSearchInput() {
      const input = document.getElementById('searchInput');
      const kw = normalizeStockKeyword(input.value.trim());
      document.getElementById('searchClear')?.classList.toggle('show', !!input.value.trim());
      clearTimeout(state.searchTimer);
      if (!kw) return closeSuggestions();
      state.searchTimer = setTimeout(async () => {
        const res = await api(`/api/v1/stocks/search?keyword=${encodeURIComponent(kw)}&limit=20`, { timeout: 8000 }).catch(() => []);
        state.searchResults = sortStockMatches(res, kw).slice(0, 12);
        renderSuggestions();
      }, 160);
    }
    function normalizeStockKeyword(value) {
      const text = safeText(value, '').trim();
      const code = text.match(/\b\d{6}\b/);
      if (code) return code[0];
      return text.replace(/\s+/g, '');
    }
    function sortStockMatches(list = [], kw = '') {
      const key = safeText(kw, '').toLowerCase();
      return [...list].sort((a, b) => {
        const an = safeText(a.name).toLowerCase(), bn = safeText(b.name).toLowerCase();
        const ac = safeText(a.code), bc = safeText(b.code);
        const ar = an.startsWith(key) || ac.startsWith(key) ? 0 : (an.includes(key) || ac.includes(key) ? 1 : 2);
        const br = bn.startsWith(key) || bc.startsWith(key) ? 0 : (bn.includes(key) || bc.includes(key) ? 1 : 2);
        return ar - br || num(b.amount) - num(a.amount);
      });
    }

    async function handleInlineStockInput(inputId, boxId) {

    async function resolveStockCode(value) {

      return first?.code || kw;
    }

    function buildSignalAdvice() {
      const map = new Map();
      (state.screening || []).forEach(s => map.set(s.code, { ...s, source: '智能选股' }));
      (state.watchlist || []).forEach(s => map.set(s.code, { ...(map.get(s.code) || {}), ...s, source: map.has(s.code) ? '选股+自选' : '自选观察' }));
      const asset = num(state.portfolio.total_asset || state.portfolio.initial_cash, 200000);
      return [...map.values()].slice(0, 60).map(s => {
        const score = num(s.quality_score || s.score, 50);
        const pctValue = num(s.pct_change);
        const capital = num((s.score_detail || {}).capital_flow, 50);
        const upProb = Math.max(18, Math.min(82, score * 0.58 + capital * 0.22 + (pctValue > 0 ? 6 : -3)));
        const downProb = Math.max(10, Math.min(80, 100 - upProb - 8));
        const amountValue = Math.round(asset * Math.max(0.01, Math.min(0.08, upProb / 1000)) / 100) * 100;
        const time = state.kill.active ? '熔断解除后' : (pctValue > 3 ? '等待回落到支撑位' : (upProb >= 62 ? '收盘前确认承接' : '继续观察'));
        return {
          code: s.code,
          name: s.name,
          source: s.source,
          time,
          amount: amountValue,
          upProb,
          downProb,
          reason: s.support_pool_status ? `支撑池状态：${supportPoolName(s.support_pool_status)}` : safeText(s.reason, '等待更多数据确认')
        };
      }).sort((a, b) => b.upProb - a.upProb);

    function sectorTypeName(value) {

    }
    function newsSentimentBadge(value) {
      if (value === 'positive') return '<span class="badge red">利好</span>';
      if (value === 'negative') return '<span class="badge green">利空</span>';
      return '<span class="badge gray">中性</span>';
    }
    function parseNewsTime(value) {
      const text = safeText(value, '');
      const now = new Date();
      let m = text.match(/(\d{4})[-/](\d{1,2})[-/](\d{1,2})\s+(\d{1,2}):(\d{2})/);
      if (m) return new Date(+m[1], +m[2] - 1, +m[3], +m[4], +m[5]);
      m = text.match(/(\d{1,2})[-/](\d{1,2})\s+(\d{1,2}):(\d{2})/);
      if (m) return new Date(now.getFullYear(), +m[1] - 1, +m[2], +m[3], +m[4]);
      m = text.match(/(\d{1,2}):(\d{2})/);
      if (m) return new Date(now.getFullYear(), now.getMonth(), now.getDate(), +m[1], +m[2]);
      return now;
    }
    function recentNews(days = 2) {
      const cutoff = Date.now() - days * 86400000;
      return (state.news || []).filter(n => parseNewsTime(n.time).getTime() >= cutoff);
    }
    function inferNewsSignal(n = {}) {
      const text = `${n.title || ''} ${n.content || ''} ${n.summary || ''}`;
      const sectorTags = [...(n.sector_tags || [])];
      const sectorMap = [
        ['稀土', /稀土|氧化镨钕|磁材|永磁/],
        ['电力', /电力|电网|特高压|绿电|火电|水电/],
        ['算力', /算力|智算|数据中心|服务器|液冷|电算协同|算电协同/],
        ['半导体', /半导体|芯片|晶圆|光刻|封测|存储/],
        ['军工', /军工|航空发动机|航天|无人机|导弹/],
        ['有色金属', /黄金|铜|铝|锂|钴|镍|金属/],
        ['能源', /原油|天然气|煤炭|油气|霍尔木兹/],
        ['券商', /证券|券商|资本市场|并购重组|两融/],
      ];
      sectorMap.forEach(([name, re]) => {
        if (re.test(text) && !sectorTags.includes(name)) sectorTags.push(name);
      });
      const pos = /利好|上涨|大涨|涨停|增长|突破|新高|增持|回购|中标|签约|获批|政策支持|景气|复苏|扩产|提价|涨价|大涨价|供需紧张|国产替代|订单|超预期|降准|降息|降息预期|鸽派|缓和|停火|谈判|电算协同|算电协同|扶持|补贴/.test(text);
      const neg = /利空|下跌|大跌|暴跌|下滑|亏损|减持|处罚|调查|风险|预警|退市|违约|诉讼|禁令|暂停|产能过剩|低于预期|加息|不降息|推迟降息|鹰派|关税|制裁|冲突升级|局势升级|战争|封锁|霍尔木兹|断供|出口管制/.test(text);
      const macro = /特朗普|伊朗|美联储|央行|证监会|国务院|发改委|财政部|商务部|工信部|降息|加息|关税|制裁|战争|霍尔木兹|国际局势|原油|汇率|美元/.test(text);
      let sentiment = n.sentiment || 'neutral';
      if (pos && !neg) sentiment = 'positive';
      else if (neg && !pos) sentiment = 'negative';
      else if (pos && neg) sentiment = macro || sectorTags.length ? (n.impact_score >= 0 ? 'positive' : 'negative') : 'neutral';
      const impact = Math.max(Math.abs(num(n.impact_score)), macro ? 2 : 0, sectorTags.length ? 1 : 0, pos || neg ? 2 : 0);
      return { ...n, sentiment, sector_tags: sectorTags.slice(0, 8), _market_relevant: macro || sectorTags.length > 0, _impact: impact };
    }
    function newsImportance(n = {}) {
      const title = `${n.title || ''} ${n.content || ''}`;
      let score = 0;
      if (/涨停|大涨|暴跌|利好|利空|监管|调查|回购|中标|获批|制裁|降息|加息|战争|封锁|关税|特朗普|伊朗|美联储|稀土|电算协同|算电协同|霍尔木兹|涨价/.test(title)) score += 3;
      score += Math.min(3, Math.abs(num(n.impact_score)) || 0);
      if ((n.duplicate_sources || []).length >= 2) score += 2;
      if ((n.sector_tags || []).length) score += 1;
      if (n.sentiment === 'positive' || n.sentiment === 'negative') score += 1;
      return score;
    }
    function enrichNewsList(list = []) {

      });
    }

    function getFirstNumber(obj, keys, fallback = 0) {
      for (const key of keys) {
        if (obj && obj[key] !== undefined && obj[key] !== null && obj[key] !== '') {

    function buildFiveLevelBook(realtime = {}, minutes = []) {
      const lastMinute = (minutes || []).filter(m => num(m.price) > 0).slice(-1)[0] || {};
      const levels = { bids: [], asks: [] };
      let hasRealBook = false;
      for (let i = 1; i <= 5; i++) {
        const bidPrice = getFirstNumber(realtime, [`bid_price${i}`, `bid${i}_price`, `buy${i}_price`], 0);
        const askPrice = getFirstNumber(realtime, [`ask_price${i}`, `ask${i}_price`, `sell${i}_price`], 0);
        const bidVolume = getFirstNumber(realtime, [`bid_volume${i}`, `bid${i}_volume`, `buy${i}_volume`], 0);
        const askVolume = getFirstNumber(realtime, [`ask_volume${i}`, `ask${i}_volume`, `sell${i}_volume`], 0);
        if (bidPrice || askPrice || bidVolume || askVolume) hasRealBook = true;
        levels.bids.push({ level: `B${i}`, price: bidPrice, volume: bidVolume });
        levels.asks.push({ level: `S${i}`, price: askPrice, volume: askVolume });
      }
      if (hasRealBook) return { ...levels, source: 'real_l1' };
      return { bids: [], asks: [], source: 'unavailable' };

      const median = amounts[Math.floor(amounts.length / 2)] || 1;
      let buy = 0, sell = 0;

      rows.forEach((row, i) => {

      const { canvas, ctx, width, height } = setup;
      const frame = drawChartFrame(ctx, width, height);
      const allRows = (rows || []).filter(r => num(r.high) > 0 && num(r.low) > 0);
      const { data } = getKlineWindow(allRows);
      bindKlineInteractions(canvas, allRows);
      if (!data.length) return drawEmpty(ctx, width, height, '暂无K线数据');
      const high = Math.max(...data.map(r => num(r.high)));
      const low = Math.min(...data.map(r => num(r.low)));
      const pad = Math.max((high - low) * .08, high * .002);
      const yOf = v => frame.top + frame.plotH - ((v - low + pad) / (high - low + pad * 2 || 1)) * frame.plotH;
      const step = frame.plotW / data.length;
      const bodyW = Math.max(3, step * .58);
      ctx.font = '12px Menlo, Consolas, monospace';
      ctx.fillStyle = '#717b8c';
      ctx.textAlign = 'right';
      for (let i = 0; i <= 4; i++) {
        const value = high + pad - (high - low + pad * 2) * i / 4;
        const y = frame.top + frame.plotH * i / 4 + 4;
        ctx.fillText(value.toFixed(2), frame.left - 6, y);
      }
      ctx.textAlign = 'center';
      const dateTicks = [0, Math.floor((data.length - 1) / 2), data.length - 1];
      dateTicks.forEach(i => {
        const r = data[i];
        if (!r) return;
        const x = frame.left + i * step + step / 2;
        ctx.fillText(formatAxisDate(r.date), x, height - 8);
      });
      data.forEach((r, i) => {
        const o = num(r.open), c = num(r.close), h = num(r.high), l = num(r.low);
        const x = frame.left + i * step + step / 2;
        ctx.strokeStyle = ctx.fillStyle = c >= o ? '#d71920' : '#148044';
        ctx.beginPath(); ctx.moveTo(x, yOf(h)); ctx.lineTo(x, yOf(l)); ctx.stroke();
        const top = Math.min(yOf(o), yOf(c));
        const bottom = Math.max(yOf(o), yOf(c));
        ctx.fillRect(x - bodyW / 2, top, bodyW, Math.max(2, bottom - top));
      });
      ctx.textAlign = 'left';
    }
    function drawVolumeChart(id, rows) {
      const setup = setupCanvas(id);
      if (!setup) return;
      const { ctx, width, height } = setup;
      const frame = drawChartFrame(ctx, width, height, { left: 56, bottom: 22, top: 10 });
      const allRows = (rows || []).filter(r => num(r.volume) > 0);
      const { data } = getKlineWindow(allRows);
      if (!data.length) return drawEmpty(ctx, width, height, '暂无成交量数据');
      const max = Math.max(...data.map(r => num(r.volume)), 1);
      const step = frame.plotW / data.length;
      const barW = Math.max(2, step * .62);
      ctx.fillStyle = '#717b8c';
      ctx.font = '12px Menlo, Consolas, monospace';
      ctx.textAlign = 'right';
      ctx.fillText(volumeText(max), frame.left - 6, frame.top + 12);
      ctx.fillText('0', frame.left - 6, frame.top + frame.plotH);
      ctx.textAlign = 'center';
      [0, data.length - 1].forEach(i => {
        const r = data[i];
        if (r) ctx.fillText(formatAxisDate(r.date), frame.left + i * step + step / 2, height - 6);
      });
      data.forEach((r, i) => {
        const h = num(r.volume) / max * frame.plotH;
        ctx.fillStyle = num(r.close) >= num(r.open) ? 'rgba(215,25,32,.72)' : 'rgba(20,128,68,.72)';
        ctx.fillRect(frame.left + i * step + (step - barW) / 2, frame.top + frame.plotH - h, barW, h);
      });
      ctx.textAlign = 'left';
    }
    function drawIntradayVolumeChart(id, rows) {
      const setup = setupCanvas(id);
      if (!setup) return;
      const { ctx, width, height } = setup;
      drawGrid(ctx, width, height);
      const data = (rows || []).filter(r => tradingMinuteIndex(r.time) !== null);
      if (!data.length) return drawEmpty(ctx, width, height, '等待盘中成交量');
      const max = Math.max(...data.map(r => num(r.volume)), 1);
      const xOf = r => tradingMinuteIndex(r.time) / 241 * width;
      const barW = Math.max(1.5, width / 260 * .72);
      data.forEach((r, i) => {
        const prev = data[Math.max(0, i - 1)];
        const h = num(r.volume) / max * (height - 18);
        ctx.fillStyle = num(r.price) >= num(prev.price) ? 'rgba(215,25,32,.72)' : 'rgba(20,128,68,.72)';
        ctx.fillRect(xOf(r) - barW / 2, height - h, barW, h);
      });
      ctx.fillStyle = '#717b8c';
      ctx.font = '12px Menlo, Consolas, monospace';
      ctx.fillText(`量 ${volumeText(data.reduce((sum, r) => sum + num(r.volume), 0))}`, 8, 16);
      ctx.fillText('09:30', 8, height - 8);
      ctx.fillText('15:00', width - 44, height - 8);
    }
    function drawIndicatorLineChart(id, rows, key, label, color = '#333843') {
      const setup = setupCanvas(id);
      if (!setup) return;
      const { ctx, width, height } = setup;
      drawGrid(ctx, width, height);
      const data = (rows || []).filter(r => tradingMinuteIndex(r.time) !== null && Number.isFinite(num(r[key], NaN)));
      if (!data.length) return drawEmpty(ctx, width, height, `等待${label}`);
      const values = data.map(r => num(r[key]));
      const min = Math.min(...values);
      const max = Math.max(...values);
      const pad = Math.max((max - min) * .12, .01);
      const yOf = v => height - ((v - min + pad) / (max - min + pad * 2 || 1)) * height;
      const xOf = r => tradingMinuteIndex(r.time) / 241 * width;
      ctx.strokeStyle = color;
      ctx.lineWidth = 1.8;
      ctx.beginPath();
      data.forEach((r, i) => {
        const x = xOf(r), y = yOf(num(r[key]));
        if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
      });
      ctx.stroke();
      ctx.fillStyle = '#717b8c';
      ctx.font = '12px Menlo, Consolas, monospace';
      ctx.fillText(`${label}:${num(data[data.length - 1][key]).toFixed(2)}`, 8, 16);
      ctx.fillText('09:30', 8, height - 8);
      ctx.fillText('15:00', width - 44, height - 8);
    }
    function drawMacdChart(id, rows) {
      const setup = setupCanvas(id);
      if (!setup) return;
      const { ctx, width, height } = setup;
      drawGrid(ctx, width, height);
      const data = calcLiveMacd(rows).filter(r => tradingMinuteIndex(r.time) !== null);
      if (!data.length) return drawEmpty(ctx, width, height, '等待MACD');
      const values = data.flatMap(r => [r.dif, r.dea, r.macd]);
      const min = Math.min(...values);
      const max = Math.max(...values);
      const pad = Math.max((max - min) * .12, .001);
      const yOf = v => height - ((v - min + pad) / (max - min + pad * 2 || 1)) * height;
      const xOf = r => tradingMinuteIndex(r.time) / 241 * width;
      const zeroY = yOf(0);
      ctx.strokeStyle = '#c9ced8';
      ctx.beginPath(); ctx.moveTo(0, zeroY); ctx.lineTo(width, zeroY); ctx.stroke();
      const barW = Math.max(1.5, width / 260 * .7);
      data.forEach(r => {
        const x = xOf(r), y = yOf(r.macd);
        ctx.fillStyle = r.macd >= 0 ? 'rgba(215,25,32,.62)' : 'rgba(20,128,68,.62)';
        ctx.fillRect(x - barW / 2, Math.min(zeroY, y), barW, Math.max(1, Math.abs(zeroY - y)));
      });
      const path = (key, color) => {
        ctx.strokeStyle = color; ctx.lineWidth = 1.5; ctx.beginPath();
        data.forEach((r, i) => {
          const x = xOf(r), y = yOf(r[key]);
          if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
        });
        ctx.stroke();
      };
      path('dif', '#333843');
      path('dea', '#d4a536');
      const last = data[data.length - 1];
      ctx.fillStyle = '#717b8c';
      ctx.font = '12px Menlo, Consolas, monospace';
      ctx.fillText(`MACD:${last.macd.toFixed(3)} DIF:${last.dif.toFixed(3)} DEA:${last.dea.toFixed(3)}`, 8, 16);
    }
    function drawSectorFlowChart(rows) {
      const setup = setupCanvas('sectorFlowChart');
      if (!setup) return;
      const { ctx, width, height } = setup;
      drawGrid(ctx, width, height);
      const allRows = (rows || []).filter(r => Number.isFinite(num(r.total_main_net_inflow, NaN)));
      if (!allRows.length) return drawEmpty(ctx, width, height, '暂无资金流快照，点击刷新后开始记录');
      const latestDate = safeText(allRows[allRows.length - 1].date || '').trim();
      const data = (latestDate ? allRows.filter(r => safeText(r.date) === latestDate) : allRows).slice(-120);
      const latest = data[data.length - 1] || {};
      const latestSectors = latest.sectors || [];
      const inflowLines = latestSectors.filter(s => num(s.main_net_inflow) > 0).sort((a, b) => num(b.main_net_inflow) - num(a.main_net_inflow)).slice(0, 3);
      const outflowLines = latestSectors.filter(s => num(s.main_net_inflow) < 0).sort((a, b) => num(a.main_net_inflow) - num(b.main_net_inflow)).slice(0, 3);
      const selected = [...inflowLines, ...outflowLines];
      const lineColors = ['#d71920', '#ff6b6b', '#f59e0b', '#148044', '#16a34a', '#0f766e'];
      const values = selected.length
        ? data.flatMap(r => selected.map(s => num((r.sectors || []).find(x => x.code === s.code)?.main_net_inflow, 0)))
        : data.map(r => num(r.total_main_net_inflow));
      const min = Math.min(...values, 0);
      const max = Math.max(...values, 0);
      const pad = Math.max((max - min) * .12, 1);
      const yOf = v => height - ((v - min + pad) / (max - min + pad * 2 || 1)) * height;
      const xOf = i => data.length <= 1 ? width / 2 : i / (data.length - 1) * width;
      const zeroY = yOf(0);
      const grad = ctx.createLinearGradient(0, 0, 0, height);
      const lastValue = num(latest.total_main_net_inflow);
      if (lastValue >= 0) {
        grad.addColorStop(0, 'rgba(215,25,32,.18)');
        grad.addColorStop(1, 'rgba(215,25,32,0)');
      } else {
        grad.addColorStop(0, 'rgba(20,128,68,.14)');
        grad.addColorStop(1, 'rgba(20,128,68,0)');
      }
      ctx.strokeStyle = '#cbd3df';
      ctx.setLineDash([4, 4]);
      ctx.beginPath(); ctx.moveTo(0, zeroY); ctx.lineTo(width, zeroY); ctx.stroke();
      ctx.setLineDash([]);
      if (!selected.length) {
        ctx.beginPath();
        data.forEach((r, i) => {
          const x = xOf(i), y = yOf(num(r.total_main_net_inflow));
          if (i === 0) ctx.moveTo(x, zeroY);
          ctx.lineTo(x, y);
        });
        ctx.lineTo(xOf(data.length - 1), zeroY);
        ctx.closePath();
        ctx.fillStyle = grad;
        ctx.fill();
      }
      const drawSeries = (sector, color) => {
        ctx.strokeStyle = color;
        ctx.lineWidth = 2;
        ctx.beginPath();
        data.forEach((r, i) => {
          const row = (r.sectors || []).find(x => x.code === sector.code) || {};
          const x = xOf(i), y = yOf(num(row.main_net_inflow));
          if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
        });
        ctx.stroke();
      };
      selected.forEach((sector, i) => drawSeries(sector, lineColors[i]));
      if (!selected.length) {
        ctx.strokeStyle = lastValue >= 0 ? '#d71920' : '#148044';
        ctx.lineWidth = 2;
        ctx.beginPath();
        data.forEach((r, i) => {
          const x = xOf(i), y = yOf(num(r.total_main_net_inflow));
          if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
        });
        ctx.stroke();
      }
      const labelPool = selected.map((item, i) => ({
        index: data.length - 1,
        rank: i % 3,
        name: item.name,
        value: num(item.main_net_inflow),
        abs: Math.abs(num(item.main_net_inflow)),
        color: lineColors[i],
      }));
      const usedBoxes = [];
      labelPool
        .filter(x => x.name && x.abs > 0)
        .forEach(label => {
          const x = Math.min(width - 92, Math.max(8, xOf(label.index) - 86));
          const baseY = yOf(label.value);
          let y = label.value >= 0 ? baseY - 42 - label.rank * 18 : baseY + 18 + label.rank * 18;
          y = Math.max(18, Math.min(height - 50, y));
          const box = { x, y, w: 88, h: 38 };
          if (usedBoxes.some(b => !(box.x + box.w < b.x || b.x + b.w < box.x || box.y + box.h < b.y || b.y + b.h < box.y))) return;
          usedBoxes.push(box);
          const positive = label.value >= 0;
          ctx.strokeStyle = label.color || (positive ? '#d71920' : '#148044');
          ctx.fillStyle = positive ? 'rgba(255,245,245,.92)' : 'rgba(242,251,245,.92)';
          ctx.lineWidth = 1.5;
          ctx.fillRect(box.x, box.y, box.w, box.h);
          ctx.strokeRect(box.x, box.y, box.w, box.h);
          ctx.fillStyle = label.color || (positive ? '#d71920' : '#148044');
          ctx.font = '12px -apple-system, BlinkMacSystemFont, sans-serif';
          ctx.fillText(safeText(label.name).slice(0, 5), box.x + 6, box.y + 15);
          ctx.font = '12px Menlo, Consolas, monospace';
          ctx.fillText(amount(label.value).replace('元', ''), box.x + 6, box.y + 31);
        });
      ctx.fillStyle = '#717b8c';
      ctx.font = '12px Menlo, Consolas, monospace';
      ctx.fillText(amount(max), 8, 16);
      ctx.fillText(amount(min), 8, height - 8);
      ctx.fillText(data[0].time || '', 8, height - 24);
      ctx.fillText(data[data.length - 1].time || '', Math.max(8, width - 74), height - 24);
      ctx.fillStyle = lastValue >= 0 ? '#d71920' : '#148044';
      ctx.font = '13px Menlo, Consolas, monospace';
      ctx.fillText(`总额 ${amount(lastValue)}`, Math.max(8, width - 132), 18);
      if (latestDate) {
        ctx.fillStyle = '#717b8c';
        ctx.font = '12px -apple-system, BlinkMacSystemFont, sans-serif';
        ctx.fillText(latestDate, Math.max(8, width - 92), height - 8);
      }
    }
    function drawStockCharts(minutes, klines) {
      requestAnimationFrame(() => {
        drawLineChart('minuteChart', minutes || [], 'price', 'avg_price');
        drawIntradayVolumeChart('intradayVolumeChart', minutes || []);
        drawIndicatorLineChart('volumeRatioChart', calcLiveVolumeRatio(minutes || []), 'volume_ratio', '量比', '#333843');
        drawMacdChart('liveMacdChart', minutes || []);
        drawKlineChart('klineChart', klines || []);
        drawVolumeChart('volumeChart', klines || []);
      });
    }
    function drawRealtimeCharts() {
      const rows = state.liveMinutes || [];
      drawStockCharts(rows, state.liveKlines || []);
      const status = document.getElementById('minuteLiveStatus');
      if (status) {
        const last = rows[rows.length - 1] || {};
        status.textContent = last.time ? `实时 ${last.time} ${price(last.price)}` : '等待分时';
      }
    }

    function initPremiumPointerEffects() {
      const root = document.documentElement;
      const canHover = window.matchMedia('(hover: hover) and (pointer: fine)').matches;
      const reduceMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
      if (!canHover || reduceMotion) return;
      let raf = 0;
      document.addEventListener('pointermove', (event) => {
        if (raf) return;
        raf = requestAnimationFrame(() => {
          root.style.setProperty('--cursor-x', `${event.clientX}px`);
          root.style.setProperty('--cursor-y', `${event.clientY}px`);
          raf = 0;
        });
      }, { passive: true });
      document.addEventListener('pointerover', (event) => {
        const card = event.target.closest('.interactive-card, .strategy-card, .sector-card, .agent-card, .chart-box, .placeholder, .hero');
        if (!card) return;
        card.addEventListener('pointermove', handleInteractiveCardMove, { passive: true });
        card.addEventListener('pointerleave', resetInteractiveCard, { once: true });
      }, { passive: true });
    }
    function enhanceInteractiveSurface() {
      document.querySelectorAll('.card, .placeholder, .chart-box').forEach(el => {
        if (el.classList.contains('table-wrap') || el.classList.contains('interactive-card')) return;
        el.classList.add('interactive-card');
      });
    }
    function handleInteractiveCardMove(event) {
      const el = event.currentTarget;
      const rect = el.getBoundingClientRect();
      if (!rect.width || !rect.height) return;
      const x = event.clientX - rect.left;
      const y = event.clientY - rect.top;
      const px = x / rect.width;
      const py = y / rect.height;
      const rotateY = (px - .5) * 5;
      const rotateX = (.5 - py) * 4;
      el.style.setProperty('--card-x', `${px * 100}%`);
      el.style.setProperty('--card-y', `${py * 100}%`);
      el.style.transform = `perspective(900px) rotateX(${rotateX}deg) rotateY(${rotateY}deg) translateY(-2px)`;
    }
    function resetInteractiveCard(event) {
      const el = event.currentTarget;
      el.removeEventListener('pointermove', handleInteractiveCardMove);
      el.style.transform = '';
      el.style.removeProperty('--card-x');
      el.style.removeProperty('--card-y');
    }

    async function bootstrap() {
      loadWatchlist();
      loadStrategy();
      loadAIRecommendationsLocal();
      loadAIChatLayout();
      initAIChatDrag();
      applyAIChatLayout();
      initNav();
      initPremiumPointerEffects();
      enhanceInteractiveSurface();
      document.addEventListener('pointermove', (event) => {
        state.pointer = { x: event.clientX, y: event.clientY };
      }, { passive: true });
      document.addEventListener('keydown', (event) => {
        if (event.ctrlKey && event.shiftKey && event.key.toLowerCase() === 'a') {
          event.preventDefault();
          toggleAIChat();
        }
      });
      renderDashboard();
      refreshShell().catch(() => {});
      ensureSectionData('dashboard').catch(() => {});
      setTimeout(() => ensureSectionData(state.active).catch(() => {}), 250);
      renderDashboard();
      setInterval(() => {
        refreshShell({ renderAfter: state.active === 'dashboard' || state.active === 'news' }).catch(() => {});
      }, 60000);
      setInterval(() => {
        if (!isCNTradingSession()) return;
        if (state.active === 'market') refreshMarketData().catch(() => {});
        if (state.active === 'signals') refreshSignalsData().catch(() => {});
        if (state.active === 'portfolio') refreshPortfolioData().catch(() => {});
      }, 15000);
      setInterval(() => {
        if (state.active === 'sectors') refreshSectors(false);
      }, 8000);
    }
    document.addEventListener('DOMContentLoaded', bootstrap);
  </script>
</body>
</html>
