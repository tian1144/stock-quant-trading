<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>股票行情 - 实时数据</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      background-color: #0f0f23;
      color: #ffffff;
      min-height: 100vh;
    }

    .header {
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
      padding: 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid #2a2a4a;
    }

    .header h1 {
      font-size: 20px;
      color: #e94560;
    }

    .header .status {
      font-size: 13px;
      color: #888888;
    }

    .header .status .dot {
      display: inline-block;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background-color: #0be881;
      margin-right: 6px;
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    .toolbar {
      padding: 12px 20px;
      display: flex;
      gap: 10px;
      background-color: #12122b;
      border-bottom: 1px solid #2a2a4a;
    }

    .search-input {
      flex: 1;
      padding: 10px 18px;
      border-radius: 25px;
      border: 1px solid #2a2a4a;
      background-color: #1a1a2e;
      color: #ffffff;
      font-size: 14px;
      outline: none;
      transition: border-color 0.3s;
    }

    .search-input:focus {
      border-color: #e94560;
    }

    .search-input::placeholder {
      color: #555555;
    }

    .btn {
      padding: 10px 20px;
      border-radius: 25px;
      border: none;
      cursor: pointer;
      font-size: 14px;
      font-weight: 500;
      transition: all 0.3s;
    }

    .btn-primary {
      background-color: #e94560;
      color: #ffffff;
    }

    .btn-primary:hover {
      background-color: #d63851;
    }

    .btn-secondary {
      background-color: #2a2a4a;
      color: #cccccc;
    }

    .btn-secondary:hover {
      background-color: #3a3a5a;
    }

    .stats-bar {
      padding: 10px 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      background-color: #12122b;
      border-bottom: 1px solid #2a2a4a;
      font-size: 13px;
      color: #888888;
    }

    .stats-bar .count {
      color: #e94560;
      font-weight: bold;
    }

    .table-container {
      overflow-x: auto;
    }

    table {
      width: 100%;
      border-collapse: collapse;
    }

    thead th {
      background-color: #16213e;
      padding: 12px 16px;
      text-align: left;
      font-size: 13px;
      color: #888888;
      font-weight: 500;
      position: sticky;
      top: 0;
      z-index: 10;
    }

    thead th:nth-child(2),
    thead th:nth-child(3) {
      text-align: right;
    }

    tbody tr {
      border-bottom: 1px solid rgba(42, 42, 74, 0.5);
      transition: background-color 0.2s;
      cursor: pointer;
    }

    tbody tr:hover {
      background-color: #1a1a3e;
    }

    tbody td {
      padding: 12px 16px;
      font-size: 14px;
    }

    td:nth-child(2),
    td:nth-child(3) {
      text-align: right;
      font-weight: bold;
      font-family: "Menlo", "Monaco", "Courier New", monospace;
    }

    .stock-name {
      color: #ffffff;
      font-weight: 500;
    }

    .stock-code {
      color: #666666;
      font-size: 12px;
      margin-top: 2px;
    }

    .price-up {
      color: #e94560;
    }

    .price-down {
      color: #0be881;
    }

    .price-flat {
      color: #888888;
    }

    .change-badge {
      display: inline-block;
      padding: 3px 10px;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 600;
    }

    .change-badge.up {
      background-color: rgba(233, 69, 96, 0.15);
      color: #e94560;
    }

    .change-badge.down {
      background-color: rgba(11, 232, 129, 0.15);
      color: #0be881;
    }

    .change-badge.flat {
      background-color: rgba(136, 136, 136, 0.15);
      color: #888888;
    }

    .load-more {
      text-align: center;
      padding: 20px;
      cursor: pointer;
      color: #888888;
      transition: color 0.3s;
    }

    .load-more:hover {
      color: #ffffff;
    }

    .loading {
      text-align: center;
      padding: 40px;
      color: #888888;
    }

    .loading .spinner {
      display: inline-block;
      width: 24px;
      height: 24px;
      border: 3px solid #2a2a4a;
      border-top-color: #e94560;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin-right: 10px;
      vertical-align: middle;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .empty {
      text-align: center;
      padding: 60px 20px;
      color: #555555;
    }

    .footer {
      padding: 20px;
      text-align: center;
      color: #444444;
      font-size: 12px;
      border-top: 1px solid #2a2a4a;
    }

    @media (max-width: 768px) {
      .header {
        flex-direction: column;
        gap: 8px;
      }

      .toolbar {
        flex-direction: column;
      }

      thead th, tbody td {
        padding: 10px 12px;
        font-size: 13px;
      }
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>📈 股票行情</h1>
    <div class="status">
      <span class="dot"></span>
      <span id="statusText">实时数据 · 每5秒刷新</span>
    </div>
  </div>

  <div class="toolbar">
    <input 
      type="text" 
      class="search-input" 
      id="searchInput" 
      placeholder="输入股票代码或名称搜索..."
      onkeydown="if(event.key==='Enter') doSearch()"
    >
    <button class="btn btn-primary" onclick="doSearch()">搜索</button>
    <button class="btn btn-secondary" onclick="clearSearch()">重置</button>
  </div>

  <div class="stats-bar">
    <span>共 <span class="count" id="totalCount">0</span> 只股票</span>
    <span id="lastUpdate">最后更新：--</span>
  </div>

  <div class="table-container">
    <table>
      <thead>
        <tr>
          <th>股票名称/代码</th>
          <th>最新价</th>
          <th>涨跌幅</th>
        </tr>
      </thead>
      <tbody id="stockTableBody">
        <tr>
          <td colspan="3">
            <div class="loading">
              <span class="spinner"></span>正在加载数据...
            </div>
          </td>
        </tr>
      </tbody>
    </table>
  </div>

  <div class="load-more" id="loadMoreBtn" style="display:none;" onclick="loadMore()">
    点击加载更多
  </div>

  <div class="footer">
    数据来源：东方财富网 · 仅供参考，不构成投资建议
  </div>

  <script>
    // 全局状态
    const state = {
      allStocks: [],
      displayedStocks: [],
      pageSize: 50,
      currentPage: 1,
      keyword: '',
      loading: false,
      refreshTimer: null
    };

    // 格式化价格
    function formatPrice(price) {
      if (!price || price === 0) return '--';
      return price.toFixed(2);
    }

    // 格式化涨跌幅
    function formatChange(pctChange) {
      if (pctChange === null || pctChange === undefined) return '--';
      if (pctChange === 0) return '0.00%';
      const prefix = pctChange > 0 ? '+' : '';
      return prefix + pctChange.toFixed(2) + '%';
    }

    // 获取样式类
    function getPriceClass(pctChange) {
      if (!pctChange || pctChange === 0) return 'flat';
      return pctChange > 0 ? 'up' : 'down';
    }

    // 加载股票列表
    async function loadStockList() {
      if (state.loading) return;

      state.loading = true;
      try {
        const response = await fetch('/api/v1/stocks?limit=10000&offset=0');
        const data = await response.json();

        if (data && data.stocks) {
          state.allStocks = data.stocks;
          state.currentPage = 1;
          renderStocks();
          document.getElementById('totalCount').textContent = data.total;
          document.getElementById('lastUpdate').textContent = '最后更新：' + new Date().toLocaleTimeString();
        }
      } catch (e) {
        console.error('加载失败:', e);
        document.getElementById('stockTableBody').innerHTML = 
          '<tr><td colspan="3"><div class="empty">加载失败，请检查后端服务是否运行</div></td></tr>';
      } finally {
        state.loading = false;
      }
    }

    // 渲染股票列表
    function renderStocks() {
      const tbody = document.getElementById('stockTableBody');
      const stocks = state.keyword ? state.allStocks : state.allStocks.slice(0, state.currentPage * state.pageSize);

      if (stocks.length === 0) {
        tbody.innerHTML = '<tr><td colspan="3"><div class="empty">暂无数据</div></td></tr>';
        document.getElementById('loadMoreBtn').style.display = 'none';
        return;
      }

      let html = '';
      for (const stock of stocks) {
        const pc = getPriceClass(stock.pct_change);
        html += `
          <tr onclick="showTip('${stock.name} ${stock.code}')">
            <td>
              <div class="stock-name">${stock.name}</div>
              <div class="stock-code">${stock.code}</div>
            </td>
            <td class="price-${pc}">${formatPrice(stock.price)}</td>
            <td><span class="change-badge ${pc}">${formatChange(stock.pct_change)}</span></td>
          </tr>
        `;
      }

      tbody.innerHTML = html;

      // 显示/隐藏加载更多按钮
      const loadMoreBtn = document.getElementById('loadMoreBtn');
      if (!state.keyword && state.currentPage * state.pageSize < state.allStocks.length) {
        loadMoreBtn.style.display = 'block';
      } else {
        loadMoreBtn.style.display = 'none';
      }
    }

    // 加载更多
    function loadMore() {
      state.currentPage++;
      renderStocks();
    }

    // 搜索
    function doSearch() {
      const keyword = document.getElementById('searchInput').value.trim().toLowerCase();
      if (!keyword) {
        state.keyword = '';
        renderStocks();
        return;
      }

      state.keyword = keyword;
      const results = state.allStocks.filter(s => 
        s.code.toLowerCase().includes(keyword) || s.name.toLowerCase().includes(keyword)
      );
      state.allStocks = results.length > 0 ? results : state.allStocks;
      
      if (results.length > 0) {
        const tbody = document.getElementById('stockTableBody');
        let html = '';
        for (const stock of results) {
          const pc = getPriceClass(stock.pct_change);
          html += `
            <tr onclick="showTip('${stock.name} ${stock.code}')">
              <td>
                <div class="stock-name">${stock.name}</div>
                <div class="stock-code">${stock.code}</div>
              </td>
              <td class="price-${pc}">${formatPrice(stock.price)}</td>
              <td><span class="change-badge ${pc}">${formatChange(stock.pct_change)}</span></td>
            </tr>
          `;
        }
        tbody.innerHTML = html;
        document.getElementById('loadMoreBtn').style.display = 'none';
        document.getElementById('totalCount').textContent = results.length;
      } else {
        document.getElementById('stockTableBody').innerHTML = 
          '<tr><td colspan="3"><div class="empty">未找到匹配的股票</div></td></tr>';
      }
    }

    // 清除搜索
    function clearSearch() {
      document.getElementById('searchInput').value = '';
      state.keyword = '';
      state.currentPage = 1;
      loadStockList();
    }

    // 提示
    function showTip(text) {
      // 简单的提示，后续可跳转到详情页
      console.log('点击:', text);
    }

    // 启动定时刷新
    function startRefresh() {
      state.refreshTimer = setInterval(() => {
        loadStockList();
      }, 5000);
    }

    // 页面加载时初始化
    document.addEventListener('DOMContentLoaded', () => {
      loadStockList();
      startRefresh();
    });
  </script>
</body>
</html>
